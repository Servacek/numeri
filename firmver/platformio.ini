; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = atmelavr
lib_deps =
    ; https://github.com/udoklein/dcf77.git
    ; https://github.com/Servacek/dcf77_xtal.git
    ; https://github.com/adafruit/RTClib.git
    ; https://github.com/RobTillaart/INA219.git
framework = arduino
; framework = baremetal

[env:uno]
board = uno

; No verification in debug mode
[env:uno_usbasp_dev]
board = uno
upload_protocol = usbasp
upload_speed = 115200
; E:FF, H:DE, L:FF
; Enabled Serial programming
board_fuses.lfuse = 0xF7
board_fuses.hfuse = 0xD7 ; Preserve EEPROM, No BOOTRST Vector (since no bootloader)
board_fuses.efuse = 0xFC ; Brown Out Detection at 4.3V since we have USB-C
build_flags =
    -Wall
    -Wextra
    ; -v
upload_flags =
    -Pusb
    -e
    ; -v
    -V ; No verification in debug mode

[env:uno_usbasp_prod]
board = uno
upload_protocol = usbasp
upload_flags =
    -Pusb
    -e

[env:unoasm]
board = uno
build_flags =
  -save-temps=obj


[env:oldnano]
board = nanoatmega328
monitor_speed = 115200
build_flags =
    ; Enable all standard warnings
    -Wall
    -Wextra
    -Wpedantic

    ; Additional useful warnings
    ; -Werror                      ; Treat warnings as errors
    -Wformat=2                   ; Check printf/scanf format strings
    -Wformat-overflow=2          ; Check for buffer overflows in formatted output
    -Wformat-truncation=2        ; Warn about truncation in formatted output
    -Wnull-dereference           ; Warn about NULL pointer dereferences
    -Wdouble-promotion           ; Warn when float is promoted to double
    -Wshadow                     ; Warn when variable shadows another
    -Wundef                      ; Warn if undefined identifier in #if
    ; -Wconversion                 ; Warn on implicit type conversions
    ; -Wsign-conversion            ; Warn on sign conversions
    -Wcast-align                 ; Warn on pointer casts with alignment issues
    -Wcast-qual                  ; Warn when casting away const/volatile
    -Wstrict-overflow=5          ; Warn about overflow in optimization
    -Wwrite-strings              ; Warn when string constants to non-const char*
    -Wswitch-enum                ; Warn about missing enum cases in switch
    -Wswitch-default             ; Warn if switch has no default
    -Wuninitialized              ; Warn about uninitialized variables
    -Wunreachable-code           ; Warn about unreachable code
    -Wstrict-prototypes          ; Warn if function declared without parameter types
    -Wmissing-prototypes         ; Warn if global function defined without prototype
    -Wredundant-decls            ; Warn about redundant declarations
    -Winline                     ; Warn if inlining fails
    -Wvla                        ; Warn about variable length arrays
    -Wstack-usage=256            ; Warn if stack usage exceeds 256 bytes

    ; Optimization-based warnings
    -Wlogical-op                 ; Warn about suspicious logical operations
    -Wduplicated-cond            ; Warn about duplicated conditions
    -Wduplicated-branches        ; Warn about duplicated branches

    ; Preprocessor warnings
    -Wundef                      ; Warn if undefined macro in #if

    ; C-specific warnings (remove if using C++)
    ; -Wold-style-definition       ; Warn about old-style function definitions
    -Wjump-misses-init           ; Warn if goto/switch skips initialization

    ; Debug info
    -g                           ; Include debug symbols
upload_flags =
    -e
    -V ; No verification in debug mode

[env:nano]
board = nanoatmega328new
