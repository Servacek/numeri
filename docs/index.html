    <script>
        function showImageInPopup(src) {
            // Create a new div, set background to black and add an image with the source
            var popup = document.createElement('div');
            popup.style.position = "fixed";
            popup.style.top = "0";
            popup.style.left = "0";
            popup.style.width = "100%";
            popup.style.height = "100%";
            popup.style.backgroundColor = "rgba(0,0,0,0.8)";
            popup.innerHTML = "<img src='" + src + "' style='width:100%; height:100%; object-fit:contain;' />";
            document.body.appendChild(popup);

            // Add event listener to close the popup when clicked
            popup.addEventListener("click", function () {
                document.body.removeChild(popup);
            });
        }
    </script>

<script>
    // Load gallery from generated JSON file
    async function loadGallery() {
        const container = document.getElementById('galleryContainer');
        const PATH = "pictures/dokumentacne_foto/";

        try {
            // Fetch the JSON list generated by the Python script
            const response = await fetch(PATH + '/filelist.json');
            const files = await response.json();

            files.forEach(file => {
                const ext = file.split('.').pop().toLowerCase();
                const wrapper = document.createElement('div');
                wrapper.className = 'gallery';

                // // Random mosaic sizing
                // if (Math.random() > 0.75) wrapper.style.gridColumn = 'span 2';
                // if (Math.random() > 0.85) wrapper.style.gridRow = 'span 2';

                if (ext === 'jpg' || ext === 'jpeg' || ext === 'png') {
                    const img = document.createElement('img');
                    img.src = PATH + file;
                    img.loading = 'lazy';
                    img.alt = file;
                    img.onload = () => img.classList.add('loaded');
                    wrapper.appendChild(img);
                } else if (ext === 'mp4') {
                    const video = document.createElement('video');
                    video.controls = true;
                    video.preload = 'metadata';
                    video.onloadeddata = () => video.classList.add('loaded');
                    const source = document.createElement('source');
                    source.src = PATH + file;
                    source.type = 'video/mp4';
                    video.appendChild(source);
                    wrapper.appendChild(video);
                }

                container.appendChild(wrapper);
            });

        } catch (e) {
            console.error('Failed to load gallery JSON:', e);
        }
    }

    loadGallery();
</script>
