            <img src="pictures/photo_2025-06-03_09-23-18.jpg" alt="Eiffel Tower" style="width:30%" onclick="showImageInPopup(this.src)">

    </div>

    <script>
        function showImageInPopup(src) {
            // Create a new div, set background to black and add an image with the source
            var popup = document.createElement('div');
            popup.style.position = "fixed";
            popup.style.top = "0";
            popup.style.left = "0";
            popup.style.width = "100%";
            popup.style.height = "100%";
            popup.style.backgroundColor = "rgba(0,0,0,0.8)";
            popup.innerHTML = "<img src='" + src + "' style='width:100%; height:100%; object-fit:contain;' />";
            document.body.appendChild(popup);

            // Add event listener to close the popup when clicked
            popup.addEventListener("click", function() {
                document.body.removeChild(popup);
            });
        }
    </script>

    <div id="Tokyo" class="tabcontent">
        <model-viewer src="../comp.glb"
                      ios-src="http://127.0.0.1:3000/numeri-iv9-hodiny-atmega328.glb"
                      alt="A 3D model of an astronaut"
                      ar
                      auto-rotate
                      camera-controls
                      shadow-intensity="1"
                      tone-mapping="ACES"
                      style="height: 100%; width: 100%;"></model-viewer>
    </div>

    <div id="firmware" class="tabcontent">
        Všetky súbory firmvéru nájdete <a href="https://github.com/Servacek/numeri/tree/master/firmware">nájdete tu.</a>
