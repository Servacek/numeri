    <script>
        function showImageInPopup(src) {
            // Create a new div, set background to black and add an image with the source
            var popup = document.createElement('div');
            popup.style.position = "fixed";
            popup.style.top = "0";
            popup.style.left = "0";
            popup.style.width = "100%";
            popup.style.height = "100%";
            popup.style.backgroundColor = "rgba(0,0,0,0.8)";
            popup.innerHTML = "<img src='" + src + "' style='width:100%; height:100%; object-fit:contain;' />";
            document.body.appendChild(popup);

            // Add event listener to close the popup when clicked
            popup.addEventListener("click", function () {
                document.body.removeChild(popup);
            });
        }
    </script>

    <script>
        const modelViewer = document.getElementById('astronaut');
        const loader = document.getElementById('loader');
        const progressBar = document.getElementById('progress-bar');

        // Update progress bar while loading
        modelViewer.addEventListener('progress', (event) => {
            if (event.detail.totalProgress !== undefined) {
                let percent = Math.round(event.detail.totalProgress * 100);
                progressBar.style.width = percent + '%';
            }
        });

        modelViewer.addEventListener('load', () => {
            loader.style.opacity = '0';
            loader.style.display = 'none';
        });
    </script>

<script>
    // Tab button handlers.
    let defaultTabName = sessionStorage.getItem("tab");
    for (let tabButton of document.getElementsByClassName("tablinks")) {
        tabButton.onclick = (event) => {
            openTab(event.target.id.split("-")[0]);
        }

        if (defaultTabName == null) {
            defaultTabName = tabButton.id.split("-")[0];
        }
    }

    // Default tab opening.
    if (defaultTabName) {
        openTab(defaultTabName);
    } else {
        const defaultTabButton = document.getElementById(`${defaultTabName}-btn`);
        openTab(defaultTabButton.id.split("-")[0]);
    }
</script>



<script>
    async function loadGallery() {
        var descriptions = {};
        try {
            const response = await fetch('descriptions.json');
            descriptions = await response.json();
        } catch (e) {
            console.error('Failed to load descriptions JSON:', e);
            descriptions = {};
        }

        const container = document.getElementById('galleryContainer');
        const PATH = "pictures/dokumentacne_foto/";
        const DEBUG = typeof DEBUG_MODE !== 'undefined' && DEBUG_MODE;

        // create overlay for popup + arrows + description
        const overlay = document.createElement('div');
        overlay.id = 'imageOverlay';
        overlay.style.cssText = `
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: default;
            overflow: hidden;
        `;

        // central container to hold image/video + desc + arrows (so clicking outside this container closes)
        const overlayInner = document.createElement('div');
        overlayInner.id = 'imageOverlayInner';
        overlayInner.style.cssText = `
            position: relative;
            flex-grow: 1;
            // max-width: 75%;
            // max-height: 75%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        `;

        const overlayImg = document.createElement('img');
        overlayImg.style.maxWidth = '100vh'; // keep 10px on each side
        overlayImg.style.maxHeight = '70vh'; // keep 25px on top (for desc) and 25px on bottom (for some more space)
        overlayImg.style.touchAction = 'none'; // allow swipe handling
        overlayImg.alt = '';

        // description area
        const overlayDesc = document.createElement('div');
        overlayDesc.style.cssText = `
            flex-grow: 1;
            display: flex;
            margin-top: 12px;
            font-size: 1.05em;
            color: white;
            text-align: center;
            max-width: 90vw;
            overflow-y: auto;   /* allow scrolling if needed */
            word-break: break-word;
        `;

        // left / right arrow buttons
        const arrowBaseStyle = `
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            cursor: pointer;
            user-select: none;
            z-index: 10000;
        `;
        const leftArrow = document.createElement('button');
        leftArrow.setAttribute('aria-label', 'Previous image');
        leftArrow.innerHTML = '&#10094;'; // chevron
        leftArrow.style.cssText = arrowBaseStyle + 'left: -80px;'; // positioned relative to overlayInner
        const rightArrow = document.createElement('button');
        rightArrow.setAttribute('aria-label', 'Next image');
        rightArrow.innerHTML = '&#10095;';
        rightArrow.style.cssText = arrowBaseStyle + 'right: -80px;';

        // adapt arrows for small screens (position them slightly inside viewport)
        function adjustArrowPositions() {
            if (window.innerWidth <= 480) {
                leftArrow.style.left = '8px';
                rightArrow.style.right = '8px';
                leftArrow.style.width = '48px';
                leftArrow.style.height = '48px';
                rightArrow.style.width = '48px';
                rightArrow.style.height = '48px';
                leftArrow.style.fontSize = '28px';
                rightArrow.style.fontSize = '28px';
            } else {
                leftArrow.style.left = '-80px';
                rightArrow.style.right = '-80px';
                leftArrow.style.fontSize = '32px';
                rightArrow.style.fontSize = '32px';
            }
        }
        window.addEventListener('resize', adjustArrowPositions);
        adjustArrowPositions();

        // assemble overlay
        overlayInner.appendChild(overlayImg);
        overlayInner.appendChild(overlayDesc);
        overlay.appendChild(overlayInner);
        overlay.appendChild(leftArrow);
        overlay.appendChild(rightArrow);
        document.body.appendChild(overlay);

        // close overlay only when clicking outside overlayInner
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeOverlay();
        });
        overlayDesc.addEventListener('click', (e) => {
            if (e.target === overlayDesc) closeOverlay()
        });
        overlayInner.addEventListener('click', (e) => {
            if (e.target === overlayInner) closeOverlay()
        });
        // wrapper.addEventListener('click', (e) => {
        //     if (e.target === overlay) closeOverlay()
        // });
        // prevent clicks on content from closing
        overlayInner.addEventListener('click', (e) => e.stopPropagation());
        overlayImg.addEventListener('click', (e) => e.stopPropagation());
        leftArrow.addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });
        rightArrow.addEventListener('click', (e) => { e.stopPropagation(); showNext(); });

        // keyboard navigation
        function onKey(e) {
            if (overlay.style.display !== 'flex') return;
            if (e.key === 'ArrowLeft') showPrev();
            if (e.key === 'ArrowRight') showNext();
            if (e.key === 'Escape') closeOverlay();
        }
        window.addEventListener('keydown', onKey);

        // swipe on overlayImg (touch)
        let startX = 0;
        let startY = 0;
        let isTouching = false;
        overlayImg.addEventListener('touchstart', (e) => {
            if (e.touches && e.touches.length === 1) {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                isTouching = true;
            }
        }, { passive: true });
        overlayImg.addEventListener('touchmove', (e) => {
            // prevent page from scrolling while swiping horizontally on the image
            if (!isTouching) return;
            if (e.touches && e.touches.length === 1) {
                const dx = e.touches[0].clientX - startX;
                const dy = e.touches[0].clientY - startY;
                // if mostly horizontal, prevent vertical scroll
                if (Math.abs(dx) > Math.abs(dy)) e.preventDefault();
            }
        }, { passive: false });
        overlayImg.addEventListener('touchend', (e) => {
            if (!isTouching) return;
            isTouching = false;
            const touch = e.changedTouches && e.changedTouches[0];
            if (!touch) return;
            const dx = touch.clientX - startX;
            const dy = touch.clientY - startY;
            const threshold = 50; // px
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > threshold) {
                if (dx < 0) showNext();
                else showPrev();
            }
        });

        try {
            // Load the list of files (filenames in order only).
            const response = await fetch(PATH + 'filelist.json');
            const files = await response.json();;

            // keep files and make a filtered list of *image* files for overlay navigation
            const allFiles = files.slice();
            const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'svg'];
            const imageFiles = allFiles.filter(f => {
                const ext = f.split('.').pop().toLowerCase();
                return imageExts.includes(ext);
            });

            // current image index in imageFiles when overlay is open
            let currentIndex = -1;

            function showOverlayAtIndex(idx) {
                if (idx < 0 || idx >= imageFiles.length) return;
                currentIndex = idx;
                const fname = imageFiles[currentIndex];
                overlayImg.src = PATH + fname;
                overlayImg.alt = descriptions[fname] || fname || '';
                overlayDesc.textContent = descriptions[fname] || '';
                overlay.style.display = 'flex';
                document.body.style.overflow = 'hidden'; // prevent background scroll
            }

            function closeOverlay() {
                overlay.style.display = 'none';
                overlayImg.src = '';
                overlayDesc.textContent = '';
                document.body.style.overflow = ''; // restore
            }

            function showPrev() {
                if (imageFiles.length === 0) return;
                const idx = (currentIndex - 1 + imageFiles.length) % imageFiles.length;
                showOverlayAtIndex(idx);
            }
            function showNext() {
                if (imageFiles.length === 0) return;
                const idx = (currentIndex + 1) % imageFiles.length;
                showOverlayAtIndex(idx);
            }

            // build gallery nodes
            files.forEach(file => {
                const ext = file.split('.').pop().toLowerCase();
                const wrapper = document.createElement('div');
                wrapper.className = 'gallery';

                if (imageExts.includes(ext)) {
                    const img = document.createElement('img');
                    img.src = PATH + file;
                    img.loading = 'lazy';
                    img.decoding = 'async';
                    img.alt = descriptions[file] || file;
                    img.onload = () => img.classList.add('loaded');

                    // Click to enlarge - find the index among imageFiles
                    wrapper.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const idx = imageFiles.indexOf(file);
                        if (idx !== -1) {
                            showOverlayAtIndex(idx);
                        } else {
                            // fallback: set image directly
                            overlayImg.src = img.src;
                            overlayDesc.textContent = descriptions[file] || '';
                            overlay.style.display = 'flex';
                        }
                    });

                    wrapper.appendChild(img);
                } else if (ext === 'mp4' || ext === 'webm' || ext === 'ogg') {
                    // video element
                    const video = document.createElement('video');
                    video.controls = true;
                    video.preload = 'metadata';
                    video.style.maxWidth = '100%';
                    video.onloadeddata = () => video.classList.add('loaded');

                    const source = document.createElement('source');
                    source.src = PATH + file;
                    source.type = 'video/' + (ext === 'mp4' ? 'mp4' : ext);
                    video.appendChild(source);

                    wrapper.appendChild(video);
                } else {
                    // unknown type: just show link or filename
                    const link = document.createElement('a');
                    link.href = PATH + file;
                    link.textContent = file;
                    link.target = '_blank';
                    wrapper.appendChild(link);
                }

                const d = descriptions[file];

                // description area (editable in DEBUG, otherwise fixed)
                if (DEBUG) {
                    const editableDescription = document.createElement("textarea");
                    editableDescription.value = descriptions[file] || '';
                    editableDescription.style.width = '100%';
                    editableDescription.style.boxSizing = 'border-box';
                    editableDescription.oninput = async () => {
                        editableDescription.style.height = 'auto';
                        editableDescription.style.height = `${editableDescription.scrollHeight}px`;
                        descriptions[file] = editableDescription.value;
                        // print(JSON.stringify(descriptions));
                    };
                    wrapper.appendChild(editableDescription);
                } else if (typeof d === 'string' && d.trim().length > 0) {
                    const fixedDescription = document.createElement("div");
                    fixedDescription.textContent = descriptions[file] || '';
                    fixedDescription.style.padding = '1em';
                    wrapper.appendChild(fixedDescription);
                }

                container.appendChild(wrapper);
            });

            // expose showPrev/showNext for debugging if needed
            window.gallery = { showNext, showPrev, openIndex: showOverlayAtIndex };

        } catch (e) {
            console.error('Failed to load gallery JSON:', e);
        }
    }

    loadGallery();
</script>
