<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <!-- Stronger Glow effect -->
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .tube {
        fill: none;
        stroke: #ff7a1a;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#glow);
      }
      .glass {
        fill: none;
        stroke: rgba(255,255,255,0.25);
        stroke-width: 2;
      }
      .highlight {
        fill: none;
        stroke: rgba(255,255,255,0.6);
        stroke-width: 1;
        stroke-linecap: round;
      }
    </style>
  </defs>

  <!-- Glass tube outline -->
  <ellipse class="glass" cx="32" cy="32" rx="28" ry="28"/>

  <!-- Numitron-style N -->
  <path class="tube" d="M18 48 V16 L46 48 V16"/>

  <!-- Highlight reflections on glass -->
  <path class="highlight" d="M14 20 C20 10, 44 10, 50 20"/>
  <path class="highlight" d="M16 44 C22 54, 42 54, 48 44"/>
</svg>
